<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap');
    html, body { margin: 0; padding: 0; background-color: #2C1A14; }
    .font-serif { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="text-[#FDFBF7]/70 border-t border-white/5 bg-[#2C1A14]">
  <!-- Flips to single column layout on screens smaller than large desktop sizes -->
  <div class="grid grid-cols-1 lg:grid-cols-2">
    
    <!-- Info Panel Box -->
    <div class="p-6 md:p-12 space-y-6 flex flex-col justify-center">
      <div class="space-y-1">
        <h3 class="font-serif text-lg tracking-[0.2em] text-white uppercase font-normal">The Lash Bar.</h3>
        <p class="text-[#FDFBF7]/40 text-xs max-w-xs font-light">Bespoke technical lash artistry, meticulously applied to honor your natural eye geometry.</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs font-light">
        <div class="space-y-0.5">
          <span class="text-[#C59B87] font-medium block uppercase tracking-wider text-[9px]">Studio Access</span>
          <p>Monday — Saturday</p>
          <p class="text-[#FDFBF7]/40">09:00 AM – 07:00 PM</p>
        </div>
        <div class="space-y-0.5">
          <span class="text-[#C59B87] font-medium block uppercase tracking-wider text-[9px]">The Courtyard Suite</span>
          <p>1204 Cedar Ridge Lane</p>
          <p class="text-[#FDFBF7]/40">Suite B (Private Parking)</p>
        </div>
      </div>

      <div class="pt-4 border-t border-white/5 text-[10px] text-[#FDFBF7]/30 font-light">
        © 2026 The Lash Bar. All Rights Reserved.
      </div>
    </div>

    <!-- Map container uses an explicitly optimized frame size for clear mobile tracking -->
    <div class="h-56 sm:h-64 lg:h-auto min-h-[240px] w-full relative bg-neutral-800 overflow-hidden opacity-85">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.2157071644173!2d-73.9878451234283!3d40.758001034839815!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c258a9a618e63d%3A0x5589414969117432!2sTimes%20Square!5e0!3m2!1sen!2sus!4v1710000000000!5m2!1sen!2sus" 
        class="absolute inset-0 w-full h-full grayscale invert contrast-125 border-0" 
        allowfullscreen="" 
        loading="lazy">
      </iframe>
    </div>

  </div>
</body>
</html>
